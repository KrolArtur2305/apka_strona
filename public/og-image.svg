<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#19705C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Accent line -->
  <rect x="80" y="200" width="60" height="3" fill="#19705C" rx="2"/>

  <!-- Main heading -->
  <text x="80" y="300" font-family="Arial Black, sans-serif" font-weight="900" font-size="96" fill="white" letter-spacing="-3">Build</text>
  <text x="370" y="300" font-family="Arial Black, sans-serif" font-weight="900" font-size="96" fill="#19705C" letter-spacing="-3">IQ</text>

  <!-- Subtitle -->
  <text x="80" y="360" font-family="Arial, sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.55)">Construction Management App for Home Builders</text>

  <!-- Tag pills -->
  <rect x="80" y="400" width="200" height="40" rx="20" fill="rgba(25,112,92,0.15)" stroke="rgba(25,112,92,0.4)" stroke-width="1"/>
  <text x="180" y="425" font-family="Arial, sans-serif" font-size="16" fill="#19705C" text-anchor="middle">Budget Tracking</text>

  <rect x="295" y="400" width="200" height="40" rx="20" fill="rgba(25,112,92,0.15)" stroke="rgba(25,112,92,0.4)" stroke-width="1"/>
  <text x="395" y="425" font-family="Arial, sans-serif" font-size="16" fill="#19705C" text-anchor="middle">Documents</text>

  <rect x="510" y="400" width="200" height="40" rx="20" fill="rgba(25,112,92,0.15)" stroke="rgba(25,112,92,0.4)" stroke-width="1"/>
  <text x="610" y="425" font-family="Arial, sans-serif" font-size="16" fill="#19705C" text-anchor="middle">Progress</text>

  <!-- URL -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.25)">mybuildiq.com</text>

  <!-- Border accent -->
  <rect x="0" y="0" width="1200" height="4" fill="#19705C"/>
</svg>
